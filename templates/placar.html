<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BeachScore AI</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #080808;
            color: white;
            font-family: Arial, sans-serif;
        }

        .top {
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111;
            border-bottom: 4px solid #00ff88;
        }

        .brand {
            font-size: 42px;
            font-weight: bold;
        }

        .court {
            font-size: 32px;
            color: #00ff88;
        }

        .match {
            font-size: 26px;
            color: #ddd;
        }

        .scoreboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding: 50px;
        }

        .team {
            border-radius: 30px;
            background: #151515;
            padding: 40px;
            text-align: center;
            border: 3px solid #333;
        }

        .team.server {
            border-color: #00ff88;
            box-shadow: 0 0 35px rgba(0,255,136,.35);
        }

        .team-name {
            font-size: 54px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .points {
            font-size: 170px;
            font-weight: bold;
            color: #00ff88;
            line-height: 1;
        }

        .details {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
        }

        .box {
            background: #222;
            padding: 22px 35px;
            border-radius: 18px;
            min-width: 150px;
        }

        .label {
            font-size: 22px;
            color: #aaa;
        }

        .value {
            font-size: 54px;
            font-weight: bold;
        }

        .status {
            margin: 0 50px;
            padding: 25px;
            border-radius: 22px;
            background: #151515;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 34px;
        }

        .warning {
            color: #ffcc00;
            font-weight: bold;
        }

        .finished {
            color: #ff4444;
            font-weight: bold;
        }

        .events {
            margin: 30px 50px;
            background: #111;
            border-radius: 20px;
            padding: 20px 30px;
            font-size: 24px;
        }

        .event {
            padding: 8px 0;
            border-bottom: 1px solid #333;
            color: #ddd;
        }

        .event:last-child {
            border-bottom: 0;
        }
    </style>
</head>
<body>

<div class="top">
    <div>
        <div class="brand">BEACH SCORE AI</div>
        <div class="match" id="matchName">Partida</div>
    </div>
    <div class="court" id="court">Quadra</div>
</div>

<div class="scoreboard">
    <div class="team" id="cardA">
        <div class="team-name" id="teamA">Dupla Azul</div>
        <div class="points" id="pointsA">0</div>
        <div class="details">
            <div class="box">
                <div class="label">GAMES</div>
                <div class="value" id="gamesA">0</div>
            </div>
            <div class="box">
                <div class="label">SETS</div>
                <div class="value" id="setsA">0</div>
            </div>
        </div>
    </div>

    <div class="team" id="cardB">
        <div class="team-name" id="teamB">Dupla Vermelha</div>
        <div class="points" id="pointsB">0</div>
        <div class="details">
            <div class="box">
                <div class="label">GAMES</div>
                <div class="value" id="gamesB">0</div>
            </div>
            <div class="box">
                <div class="label">SETS</div>
                <div class="value" id="setsB">0</div>
            </div>
        </div>
    </div>
</div>

<div class="status">
    <div id="serverInfo">Saque: -</div>
    <div id="sideChangeInfo"></div>
    <div id="finishedInfo"></div>
</div>

<div class="events" id="events"></div>

<script>
    const socket = io();

    function render(data) {
        document.getElementById("court").innerText = data.court;
        document.getElementById("matchName").innerText = data.match_name;

        document.getElementById("teamA").innerText = data.team_a;
        document.getElementById("teamB").innerText = data.team_b;

        document.getElementById("pointsA").innerText = data.score.A.label;
        document.getElementById("pointsB").innerText = data.score.B.label;

        document.getElementById("gamesA").innerText = data.score.A.games;
        document.getElementById("gamesB").innerText = data.score.B.games;

        document.getElementById("setsA").innerText = data.score.A.sets;
        document.getElementById("setsB").innerText = data.score.B.sets;

        document.getElementById("cardA").classList.toggle("server", data.server === "A");
        document.getElementById("cardB").classList.toggle("server", data.server === "B");

        document.getElementById("serverInfo").innerText =
            "Saque: " + (data.server === "A" ? data.team_a : data.team_b);

        document.getElementById("sideChangeInfo").innerHTML =
            data.side_change ? '<span class="warning">VIRADA DE CAMPO</span>' : '';

        document.getElementById("finishedInfo").innerHTML =
            data.finished ? '<span class="finished">PARTIDA ENCERRADA</span>' : '';

        const events = document.getElementById("events");
        events.innerHTML = "";

        data.events.forEach(e => {
            const div = document.createElement("div");
            div.className = "event";
            div.innerText = e.time + " - " + e.text;
            events.appendChild(div);
        });
    }

    socket.on("state", render);

    fetch("/api/state")
        .then(r => r.json())
        .then(render);
</script>

</body>
</html>
