<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Controle - BeachScore AI</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #101010;
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #00ff88;
        }

        .card {
            background: #1a1a1a;
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 18px;
        }

        input, select {
            width: 100%;
            font-size: 22px;
            padding: 14px;
            margin: 8px 0;
            border-radius: 12px;
            border: 0;
        }

        button {
            width: 100%;
            font-size: 28px;
            font-weight: bold;
            padding: 22px;
            margin: 10px 0;
            border-radius: 16px;
            border: 0;
        }

        .blue { background: #008cff; color: white; }
        .red { background: #ff3333; color: white; }
        .green { background: #00cc77; color: white; }
        .gray { background: #ddd; color: #111; }
        .yellow { background: #ffcc00; color: #111; }

        .score {
            font-size: 34px;
            text-align: center;
            margin: 20px 0;
        }

        .voiceResult {
            font-size: 20px;
            color: #00ff88;
            text-align: center;
            min-height: 32px;
        }
    </style>
</head>
<body>

<h1>BeachScore AI</h1>

<div class="card">
    <input id="court" placeholder="Quadra" value="Quadra 1">
    <input id="match_name" placeholder="Nome da partida" value="Partida Demo">
    <input id="team_a" placeholder="Dupla A" value="Dupla Azul">
    <input id="team_b" placeholder="Dupla B" value="Dupla Vermelha">

    <select id="server">
        <option value="A">Saque inicial: Dupla A</option>
        <option value="B">Saque inicial: Dupla B</option>
    </select>

    <button class="green" onclick="saveConfig()">SALVAR CONFIGURAÇÃO</button>
</div>

<div class="card">
    <div class="score" id="scoreText">0 x 0</div>

    <button class="blue" onclick="point('A')">PONTO DUPLA A</button>
    <button class="red" onclick="point('B')">PONTO DUPLA B</button>
    <button class="yellow" onclick="undo()">DESFAZER</button>
    <button class="gray" onclick="newMatch()">NOVA PARTIDA</button>
</div>

<div class="card">
    <button class="green" onclick="startVoice()">🎤 FALAR COMANDO</button>
    <div class="voiceResult" id="voiceResult"></div>
</div>

<script>
    const socket = io();
    let lastState = null;

    function updateControl(data) {
        lastState = data;

        document.getElementById("scoreText").innerText =
            data.team_a + " " +
            data.score.A.label + " | Games " + data.score.A.games + " | Sets " + data.score.A.sets +
            "\n" +
            data.team_b + " " +
            data.score.B.label + " | Games " + data.score.B.games + " | Sets " + data.score.B.sets;
    }

    socket.on("state", updateControl);

    fetch("/api/state")
        .then(r => r.json())
        .then(updateControl);

    function point(team) {
        fetch("/api/point/" + team, { method: "POST" });
    }

    function undo() {
        fetch("/api/undo", { method: "POST" });
    }

    function newMatch() {
        if (confirm("Iniciar nova partida?")) {
            fetch("/api/new", { method: "POST" });
        }
    }

    function saveConfig() {
        const payload = {
            court: document.getElementById("court").value,
            match_name: document.getElementById("match_name").value,
            team_a: document.getElementById("team_a").value,
            team_b: document.getElementById("team_b").value,
            server: document.getElementById("server").value
        };

        fetch("/api/config", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
        });
    }

    function sendCommand(command) {
        document.getElementById("voiceResult").innerText = "Comando: " + command;

        fetch("/api/command", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({command})
        })
        .then(r => r.json())
        .then(data => {
            document.getElementById("voiceResult").innerText = data.result;
        });
    }

    function startVoice() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            alert("Seu navegador não suporta reconhecimento de voz. Use Chrome no Android.");
            return;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = "pt-BR";
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onresult = function(event) {
            const command = event.results[0][0].transcript;
            sendCommand(command);
        };

        recognition.onerror = function(event) {
            document.getElementById("voiceResult").innerText = "Erro no reconhecimento: " + event.error;
        };

        recognition.start();
    }
</script>

</body>
</html>
