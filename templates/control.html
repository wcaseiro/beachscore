<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Controle - BeachScore AI</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #101010;
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #00ff88;
        }

        .card {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 18px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        input, select {
            box-sizing: border-box;
            width: 100%;
            font-size: 20px;
            padding: 14px;
            margin: 8px 0;
            border-radius: 8px;
            border: 0;
        }

        button {
            width: 100%;
            font-size: 24px;
            font-weight: bold;
            padding: 18px;
            margin: 10px 0;
            border-radius: 8px;
            border: 0;
            cursor: pointer;
        }

        .blue { background: #008cff; color: white; }
        .red { background: #ff3333; color: white; }
        .green { background: #00cc77; color: white; }
        .gray { background: #ddd; color: #111; }
        .yellow { background: #ffcc00; color: #111; }

        .score {
            font-size: 30px;
            text-align: center;
            margin: 20px 0;
            white-space: pre-line;
        }

        .voiceResult {
            font-size: 20px;
            color: #00ff88;
            text-align: center;
            min-height: 32px;
        }

        .voiceResult.error {
            color: #ff6666;
        }

        a {
            color: #00ff88;
        }

        @media (max-width: 720px) {
            .row { grid-template-columns: 1fr; }
            button { font-size: 20px; }
        }
    </style>
</head>
<body>

<h1>BeachScore AI</h1>

<div class="card">
    <div class="row">
        <input id="court_id" placeholder="ID da arena" value="arena-1">
        <input id="court" placeholder="Arena" value="Arena 01">
    </div>
    <input id="match_name" placeholder="Nome da partida" value="Partida Principal">
    <div class="row">
        <input id="team_a" placeholder="Dupla A" value="Dupla Azul">
        <input id="team_b" placeholder="Dupla B" value="Dupla Vermelha">
    </div>

    <select id="server">
        <option value="A">Saque inicial: Dupla A</option>
        <option value="B">Saque inicial: Dupla B</option>
    </select>

    <button class="green" onclick="saveConfig()">SALVAR CONFIGURACAO</button>
</div>

<div class="card">
    <div class="score" id="scoreText">0 x 0</div>

    <button class="blue" id="pointAButton" onclick="point('A')">PONTO DUPLA A</button>
    <button class="red" id="pointBButton" onclick="point('B')">PONTO DUPLA B</button>
    <button class="yellow" onclick="undo()">DESFAZER</button>
    <button class="gray" onclick="newMatch()">NOVA PARTIDA</button>
</div>

<div class="card">
    <button class="green" onclick="startVoice()">FALAR COMANDO</button>
    <div class="voiceResult" id="voiceResult"></div>
</div>

<p><a href="/admin">Abrir dashboard admin</a></p>

<script>
    const params = new URLSearchParams(window.location.search);
    let courtId = params.get("court_id") || params.get("arena_id") || "arena-1";
    document.getElementById("court_id").value = courtId;

    const socket = io({query: {court_id: courtId}});
    let lastState = null;

    function endpoint(path) {
        return "/api/courts/" + encodeURIComponent(courtId) + path;
    }

    function updateControl(data) {
        lastState = data;
        courtId = data.court_id || courtId;

        document.getElementById("court_id").value = courtId;
        document.getElementById("court").value = data.court;
        document.getElementById("match_name").value = data.match_name;
        document.getElementById("team_a").value = data.team_a;
        document.getElementById("team_b").value = data.team_b;
        document.getElementById("server").value = data.server;
        document.getElementById("pointAButton").innerText = "PONTO " + data.team_a.toUpperCase();
        document.getElementById("pointBButton").innerText = "PONTO " + data.team_b.toUpperCase();

        document.getElementById("scoreText").innerText =
            data.team_a + " " +
            data.score.A.label + " | Games " + data.score.A.games + " | Sets " + data.score.A.sets +
            "\n" +
            data.team_b + " " +
            data.score.B.label + " | Games " + data.score.B.games + " | Sets " + data.score.B.sets;
    }

    socket.on("state", updateControl);

    fetch(endpoint("/state"))
        .then(r => r.json())
        .then(updateControl);

    function point(team) {
        fetch(endpoint("/point/" + team), { method: "POST" });
    }

    function undo() {
        fetch(endpoint("/undo"), { method: "POST" });
    }

    function newMatch() {
        if (confirm("Iniciar nova partida?")) {
            fetch(endpoint("/new"), { method: "POST" });
        }
    }

    function saveConfig() {
        courtId = document.getElementById("court_id").value || "arena-1";
        const payload = {
            court: document.getElementById("court").value,
            match_name: document.getElementById("match_name").value,
            team_a: document.getElementById("team_a").value,
            team_b: document.getElementById("team_b").value,
            server: document.getElementById("server").value,
            arena: document.getElementById("court").value
        };

        fetch(endpoint("/config"), {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
        })
        .then(r => r.json())
        .then(updateControl);
    }

    function sendCommand(command) {
        showVoiceResult("Comando: " + command, false);

        fetch(endpoint("/command"), {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({command})
        })
        .then(r => r.json())
        .then(data => {
            showVoiceResult(data.result, !data.recognized);
            playTone(data.recognized ? "success" : "error");
            updateControl(data.state);
        });
    }

    function startVoice() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            playTone("error");
            alert("Seu navegador nao suporta reconhecimento de voz. Use Chrome no Android.");
            return;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = "pt-BR";
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onresult = function(event) {
            sendCommand(event.results[0][0].transcript);
        };

        recognition.onerror = function(event) {
            showVoiceResult("Erro no reconhecimento: " + event.error, true);
            playTone("error");
        };

        recognition.start();
    }

    function showVoiceResult(text, isError) {
        const element = document.getElementById("voiceResult");
        element.innerText = text;
        element.classList.toggle("error", isError);
    }

    function playTone(type) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;

        const audio = new AudioContext();
        const oscillator = audio.createOscillator();
        const gain = audio.createGain();

        oscillator.type = type === "error" ? "square" : "sine";
        oscillator.frequency.value = type === "error" ? 180 : 880;
        gain.gain.value = 0.08;

        oscillator.connect(gain);
        gain.connect(audio.destination);
        oscillator.start();
        oscillator.stop(audio.currentTime + (type === "error" ? 0.35 : 0.12));
    }
</script>

</body>
</html>
